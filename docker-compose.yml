services:
  postgres:
    image: postgres:16
    container_name: coffeeshop-postgres
    environment:
      POSTGRES_DB: coffeeshop
      POSTGRES_USER: coffeeshop
      POSTGRES_PASSWORD: coffeeshop
    ports:
      - "5433:5432"
    volumes:
      - coffeeshop_pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: coffeeshop-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@coffeeshop.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  coffeeshop_pgdata:

